name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  DATABASE_URL: "postgresql://atlas:atlas123@localhost:5432/atlas_shop_test?schema=public"
  JWT_SECRET: "ci-secret-key"
  JWT_EXPIRES_IN: "7d"
  PORT: 8000

jobs:
  lint:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas123
          POSTGRES_DB: atlas_shop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Build Admin
        working-directory: apps/admin
        run: npm run build

      - name: Build Web
        working-directory: apps/web
        run: npm run build

  smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas123
          POSTGRES_DB: atlas_shop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Push schema & seed
        working-directory: apps/api
        run: |
          npx prisma db push --accept-data-loss
          echo "Schema pushed to PostgreSQL"

      - name: Build
        working-directory: apps/api
        run: npm run build

      - name: Run smoke tests
        working-directory: apps/api
        run: |
          # Start server
          node dist/main.js &
          SERVER_PID=$!
          sleep 5

          echo "=== Health check ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8000/api/docs

          echo "=== Register ==="
          curl -s -X POST http://localhost:8000/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"CI User","email":"ci@test.com","password":"test123"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'User: {d[\"user\"][\"name\"]}')"

          echo "=== Login ==="
          TOKEN=$(curl -s -X POST http://localhost:8000/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"test123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null)

          echo "=== Profile ==="
          curl -s http://localhost:8000/api/v1/auth/me \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Profile: {d[\"name\"]} / {d[\"email\"]}')"

          echo "=== Categories ==="
          curl -s http://localhost:8000/api/v1/categories \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Categories: {len(d)}')"

          echo "=== Create category ==="
          curl -s -X POST http://localhost:8000/api/v1/categories \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"الکترونیک","slug":"electronics"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Cat: {d[\"name\"]} ({d[\"id\"]})')"

          echo "=== Create product ==="
          curl -s -X POST http://localhost:8000/api/v1/products \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"title":"هدفون بلوتوث","slug":"bluetooth-headphone","price":2500000,"stock":50,"categoryId":1}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Product: {d[\"title\"]} ({d[\"id\"]})')"

          echo "=== List products ==="
          curl -s "http://localhost:8000/api/v1/products?sort=newest" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Products: {d[\"total\"]}')"

          echo "=== Shipping methods ==="
          curl -s http://localhost:8000/api/v1/shipping/methods \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Methods: {len(d)}')"

          echo "=== Create order ==="
          curl -s -X POST http://localhost:8000/api/v1/orders \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"items":[{"productId":1,"quantity":2}],"shippingMethod":"post_pishtaz","agreedToTerms":true}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Order: {d[\"orderNumber\"]} / {d[\"total\"]} ریال / {d[\"status\"]}')"

          echo "=== Create coupon ==="
          curl -s -X POST http://localhost:8000/api/v1/coupons \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"code":"SUMMER20","type":"percent","value":20,"maxUses":50}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Coupon: {d[\"code\"]} - %{d[\"value\"]}')"

          echo "=== Validate coupon ==="
          curl -s "http://localhost:8000/api/v1/coupons/validate?code=SUMMER20&subtotal=5000000" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Valid: {d[\"valid\"]}, Discount: {d[\"discount\"]}')"

          echo "=== Payment gateways ==="
          curl -s http://localhost:8000/api/v1/payments/gateways \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Gateways: {len(d)}')"

          echo "=== Payment request ==="
          curl -s -X POST http://localhost:8000/api/v1/payments/request/1 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"gateway":"zarinpal"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Authority: {d[\"authority\"]}, URL: {d[\"paymentUrl\"][:50]}...')"

          echo "=== Admin stats ==="
          curl -s http://localhost:8000/api/v1/admin/stats \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Stats: {d[\"totalUsers\"]} users, {d[\"totalProducts\"]} products, {d[\"totalOrders\"]} orders, {d[\"totalRevenue\"]} revenue')"

          echo "=== Update profile ==="
          curl -s -X PUT http://localhost:8000/api/v1/auth/profile \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"CI User Updated","phone":"09120000000"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Updated: {d[\"name\"]} / {d[\"phone\"]}')"

          echo ""
          echo "========================================"
          echo "  ALL SMOKE TESTS PASSED SUCCESSFULLY"
          echo "========================================"

          kill $SERVER_PID 2>/dev/null
